upstream licreamo_backend  { server backend:8080; }
upstream licreamo_frontend { server frontend:80; }

server {
    listen 80;
    server_name _;
    client_max_body_size 5G;

    # Inject tenant subdomain header so backend resolves tenant without DNS in dev
    proxy_set_header X-Tenant-Subdomain "ccl";
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;

    location /api/ {
        proxy_pass         http://licreamo_backend/;
        proxy_http_version 1.1;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Tenant-Subdomain "ccl";
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        client_max_body_size 5G;
    }

    location / {
        proxy_pass         http://licreamo_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }
}
