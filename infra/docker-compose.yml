version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: licreamo-db
    env_file: ../.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./seed:/seed:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: licreamo-api
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8080"
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: licreamo-web
    expose:
      - "80"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: licreamo-nginx
    volumes:
      - ./nginx/ccl.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${HOST_PORT:-80}:80"
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  pg_data:
