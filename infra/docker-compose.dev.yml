version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: licreamo-db-dev
    env_file: ../.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5434:5432"
    volumes:
      - pg_data_dev:/var/lib/postgresql/data
      - ./seed:/seed:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile.dev
    container_name: licreamo-api-dev
    env_file: ../.env
    environment:
      POSTGRES_HOST: postgres
    volumes:
      - ../backend:/app
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:22-alpine
    container_name: licreamo-web-dev
    working_dir: /app
    volumes:
      - ../frontend:/app
    command: sh -c "npm install && npm start -- --host 0.0.0.0 --port 4200"
    ports:
      - "4200:4200"

volumes:
  pg_data_dev:
